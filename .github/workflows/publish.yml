name: Publish Extension

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            os: windows-latest
          - target: darwin-x64
            os: macos-13
          - target: darwin-arm64
            os: macos-latest
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-latest
            cross_compile: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Linux ARM64 cross-compilers
        if: matrix.cross_compile && matrix.target == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies (Standard)
        if: ${{ !matrix.cross_compile }}
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (Cross-compile Linux ARM64)
        if: matrix.cross_compile && matrix.target == 'linux-arm64'
        env:
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
          npm_config_arch: arm64
          npm_config_target_arch: arm64
        run: pnpm install --frozen-lockfile

      - name: Package Extension
        run: npx @vscode/vsce package --target ${{ matrix.target }} -o magic-terminal-${{ matrix.target }}.vsix

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: magic-terminal-${{ matrix.target }}.vsix

  publish:
    name: Publish to Marketplace
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all packaged VSIXs
        uses: actions/download-artifact@v4
        with:
          path: vsix-packages
          pattern: vsix-*
          merge-multiple: true

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          for vsix in vsix-packages/*.vsix; do
            echo "Publishing $vsix..."
            npx @vscode/vsce publish --packagePath "$vsix"
          done
